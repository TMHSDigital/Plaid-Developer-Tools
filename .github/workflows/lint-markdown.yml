name: Markdown Lint

on:
  push:
    branches: [main]
    paths: ['**/*.md']
  pull_request:
    branches: [main]
    paths: ['**/*.md']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for broken relative links
        run: |
          errors=0
          while IFS= read -r file; do
            dir=$(dirname "$file")
            grep -oP '\[.*?\]\(\K[^)]+' "$file" | while read -r link; do
              # skip URLs, anchors, and badge images
              case "$link" in
                "http*"|"https*"|"#*"|"*.svg*"|"*.shields.io*") continue ;;
              esac
              # strip anchor from path
              path="${link%%#*}"
              [ -z "$path" ] && continue
              target="$dir/$path"
              if [ ! -e "$target" ]; then
                echo "BROKEN LINK: $file -> $link (resolved to $target)"
                errors=$((errors + 1))
              fi
            done
          done < <(find . -name '*.md' -not -path './node_modules/*' -not -path './mcp-server/node_modules/*')
          if [ $errors -gt 0 ]; then
            echo "$errors broken link(s) found."
            exit 1
          fi
          echo "All relative links resolve."

      - name: Check for trailing whitespace
        run: |
          files=$(find . -name '*.md' -not -path './node_modules/*' -not -path './mcp-server/node_modules/*')
          errors=0
          for f in $files; do
            if grep -Pn '\s+$' "$f"; then
              echo "  ^ trailing whitespace in $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found trailing whitespace in $errors file(s)."
            exit 1
          fi
          echo "No trailing whitespace."

      - name: Check for em dashes
        run: |
          files=$(find . -name '*.md' -not -path './node_modules/*' -not -path './mcp-server/node_modules/*')
          found=0
          for f in $files; do
            if grep -Pn 'â€”' "$f"; then
              echo "  ^ em dash in $f"
              found=$((found + 1))
            fi
          done
          if [ $found -gt 0 ]; then
            echo "Found em dashes in $found file(s). Use hyphens instead."
            exit 1
          fi
          echo "No em dashes."
