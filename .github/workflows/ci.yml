name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run test suite
        run: pytest tests/ -v --tb=short

  build-mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Smoke test (server starts without crashing)
        run: |
          sleep 10 | timeout 5 node dist/index.js &
          SERVER_PID=$!
          sleep 2
          if kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "Server still running after 2s — smoke test passed."
            kill "$SERVER_PID" 2>/dev/null || true
            wait "$SERVER_PID" 2>/dev/null || true
          else
            wait "$SERVER_PID" 2>/dev/null || code=$?
            if [ "${code:-0}" -eq 124 ]; then
              echo "Server ran until timeout — smoke test passed."
            else
              echo "Server exited early with code ${code:-0}"
              exit 1
            fi
          fi
        env:
          PLAID_CLIENT_ID: test
          PLAID_SECRET: test
          PLAID_ENV: sandbox
